<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor Personal - MP3</title>
    <style>
        body { 
            background: black; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 0, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 0, 0, 0.2) 0%, transparent 40%);
        }

        .pantalla { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        .activa { display: flex; }

        .fila-albumnes { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 30px; 
            width: 90%; 
            max-width: 1200px;
            margin-top: 50px; 
            padding-bottom: 50px;
        }

        .album-card { border: 2px solid white; padding: 10px; cursor: pointer; transition: 0.3s; text-align: center; }
        .album-card:hover { background: rgba(128,0,0,0.3); transform: scale(1.05); border-color: #800000; }
        .album-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .contenedor-lista { display: grid; grid-template-columns: 1fr 250px 1fr; align-items: start; gap: 30px; margin-top: 30px; width: 90%; }
        .circulo-album { width: 250px; height: 250px; border-radius: 50%; border: 5px solid white; object-fit: cover; position: sticky; top: 50px; }
        .columna-temas { display: flex; flex-direction: column; gap: 10px; }
        
        .btn-tema { border: 2px solid white; padding: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; background: none; color: white; text-align: left; transition: 0.2s; }
        .btn-tema:hover:not(.vacio) { background: rgba(128,0,0,0.3); }
        .btn-tema.vacio { border-color: #444; color: #666; cursor: default; }
        
        .play-square { 
            width: 24px; height: 24px; border: 2px solid white; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; flex-shrink: 0;
        }

        /* --- NUEVO LAYOUT PARA PANTALLA 3 --- */
        .layout-reproductor {
            display: grid;
            grid-template-columns: 1fr 400px 1fr;
            width: 95%;
            gap: 20px;
            align-items: center;
            margin-top: 10px;
        }

        .texto-info {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.95em;
            line-height: 1.6;
            white-space: pre-line;
        }

        .letra-col { border-left: 4px solid #0000ff; color: #add8e6; text-align: left; }
        .significado-col { border-right: 4px solid #800000; color: #ffcccb; text-align: right; }

        .vinilo { width: 400px; height: 400px; border-radius: 50%; border: 15px solid #1a1a1a; box-shadow: 0 0 30px rgba(255,0,0,0.6); animation: girar 5s linear infinite; animation-play-state: paused; object-fit: cover; margin: 20px 0; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .girando { animation-play-state: running; }
        
        .controles { margin-top: 10px; width: 400px; text-align: center; }
        .barra-progreso { width: 100%; height: 6px; background: #333; margin: 15px 0; border-radius: 3px; overflow: hidden; cursor: pointer; }
        
        .fila-botones { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .cuadradito-bordo { width: 40px; height: 40px; background: #800000; cursor: pointer; border: none; }
        
        .btn-nav { background: none; border: none; cursor: pointer; display: flex; align-items: center; padding: 0; }
        .triangulo { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; transition: 0.2s; }
        .izq { border-right: 25px solid white; }
        .der { border-left: 25px solid white; }

        .volumen-cont { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        input[type=range] { cursor: pointer; accent-color: #800000; }
        .btn-volver { align-self: flex-start; color: white; background: none; border: 1px solid white; cursor: pointer; padding: 8px 15px; margin-bottom: 10px; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>

    <div id="p1" class="pantalla activa">

        <div class="fila-albumnes" id="galeria"></div>
    </div>

                    <div class="barra-progreso" id="barra" onclick="saltarA(event)">

                        <span>🔊</span>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: SIGNIFICADO -->
            <div id="significado-txt" class="texto-info significado-col"></div>
        </div>

        let albumSeleccionado = null;
        let indiceTemaActual = 0;
        const player = document.getElementById('reproductor-audio');

        function cargarGaleria() {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = "";
            datos.forEach((album, index) => {
                galeria.innerHTML += `
                    <div class="album-card" onclick="verAlbum(${index})">
                        <p>${album.artista}<br><b>${album.album}</b></p>
                        <img src="${album.portada}" alt="Portada">
                    </div>`;
            });
        }

        function irA(pantallaId) {
            if (pantallaId === 'p1' || pantallaId === 'p2') {
                player.pause();
                document.getElementById('img-vinilo').classList.remove('girando');
            }
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(pantallaId).classList.add('activa');
        }

        function verAlbum(index) {
            albumSeleccionado = datos[index];
            document.getElementById('img-album-lista').src = albumSeleccionado.portada;
            const izq = document.getElementById('temas-izq');
            const der = document.getElementById('temas-der');
            izq.innerHTML = ""; der.innerHTML = "";

            albumSeleccionado.temas.forEach((tema, i) => {
                const esVacio = tema.nombre === "";
                const claseVacio = esVacio ? "vacio" : "";
                const onclick = esVacio ? "" : `onclick="reproducir(${i})"`;
                
                const html = `
                    <button class="btn-tema ${claseVacio}" ${onclick}>
                        <div class="play-square">${tema.pos}</div> 
                        ${esVacio ? "---" : tema.nombre}
                    </button>`;
                if(i < 8) izq.innerHTML += html; else der.innerHTML += html;
            });
            irA('p2');
        }

        function reproducir(indice) {
            indiceTemaActual = indice;
            const tema = albumSeleccionado.temas[indice];
            if(!tema || !tema.nombre) return;

            document.getElementById('nombre-tema-reproduciendo').innerText = tema.nombre;
            document.getElementById('img-vinilo').src = albumSeleccionado.portada;
            
            // Cargar letra y significado
            document.getElementById('letra-txt').innerText = tema.letra || "Letra no disponible aún.";
            document.getElementById('significado-txt').innerText = tema.significado || "Significado no disponible aún.";
            
            player.src = tema.archivo;
            player.play();
            document.getElementById('img-vinilo').classList.add('girando');
            irA('p3');
        }

        function siguienteTema() {
            let siguiente = (indiceTemaActual + 1) % albumSeleccionado.temas.length;
            while (siguiente < albumSeleccionado.temas.length && !albumSeleccionado.temas[siguiente].nombre) {
                siguiente = (siguiente + 1) % albumSeleccionado.temas.length;
            }
            reproducir(siguiente);
        }

        function pausar() {
            const v = document.getElementById('img-vinilo');
            if (!player.paused) { player.pause(); v.classList.remove('girando'); } 
            else { player.play(); v.classList.add('girando'); }
        }

        function reiniciarTema() {
            player.currentTime = 0;
            if (player.paused) { player.play(); document.getElementById('img-vinilo').classList.add('girando'); }
        }

        function actualizarBarra() {
            if (player.duration) {
                const pct = (player.currentTime / player.duration) * 100;
                document.getElementById('progreso').style.width = pct + "%";
            }
        }

        function saltarA(e) {
            const barra = document.getElementById('barra');
            const rect = barra.getBoundingClientRect();
            const x = e.clientX - rect.left;
            player.currentTime = (x / rect.width) * player.duration;
        }

        function cambiarVolumen(v) { player.volume = v; }

        cargarGaleria();
    </script>
