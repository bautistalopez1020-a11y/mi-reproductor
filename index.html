<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor Personal - MP3</title>
    <style>
        body { 
            background: black; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 0, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 0, 0, 0.2) 0%, transparent 40%);
        }

        .pantalla { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        .activa { display: flex; }

        /* PANTALLA 1 */
        .fila-albumnes { display: flex; flex-direction: row; justify-content: flex-start; gap: 30px; width: 80%; margin-top: 50px; overflow-x: auto; padding-bottom: 20px; }
        .album-card { flex: 0 0 180px; border: 2px solid white; padding: 10px; cursor: pointer; transition: 0.3s; text-align: center; }
        .album-card:hover { background: rgba(128,0,0,0.3); transform: scale(1.05); border-color: #800000; }
        .album-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* PANTALLA 2 */
        .contenedor-lista { display: grid; grid-template-columns: 1fr 250px 1fr; align-items: start; gap: 30px; margin-top: 30px; width: 90%; }
        .circulo-album { width: 250px; height: 250px; border-radius: 50%; border: 5px solid white; object-fit: cover; position: sticky; top: 50px; }
        .columna-temas { display: flex; flex-direction: column; gap: 10px; }
        
        .btn-tema { border: 2px solid white; padding: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; background: none; color: white; text-align: left; transition: 0.2s; }
        .btn-tema:hover:not(.vacio) { background: rgba(128,0,0,0.3); }
        .btn-tema.vacio { border-color: #444; color: #666; cursor: default; }
        
        .play-square { 
            width: 24px; height: 24px; border: 2px solid white; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; flex-shrink: 0;
        }

        /* PANTALLA 3 */
        .vinilo { width: 400px; height: 400px; border-radius: 50%; border: 15px solid #1a1a1a; box-shadow: 0 0 30px rgba(255,0,0,0.6); animation: girar 5s linear infinite; animation-play-state: paused; object-fit: cover; margin: 20px 0; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .girando { animation-play-state: running; }
        .controles { margin-top: 20px; width: 400px; text-align: center; }
        .barra-progreso { width: 100%; height: 6px; background: #333; margin: 15px 0; border-radius: 3px; overflow: hidden; }
        
        .fila-botones { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .cuadradito-bordo { width: 40px; height: 40px; background: #800000; cursor: pointer; border: none; }
        
        .btn-nav { background: none; border: none; cursor: pointer; display: flex; align-items: center; padding: 0; }
        .triangulo { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; transition: 0.2s; }
        .izq { border-right: 25px solid white; }
        .der { border-left: 25px solid white; }

        .volumen-cont { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        input[type=range] { cursor: pointer; accent-color: #800000; }
        .btn-volver { align-self: flex-start; color: white; background: none; border: 1px solid white; cursor: pointer; padding: 8px 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="p1" class="pantalla activa">
        <h1>REPRODUCTOR PERSONAL</h1>
        <div class="fila-albumnes" id="galeria"></div>
    </div>

    <div id="p2" class="pantalla">
        <button class="btn-volver" onclick="irA('p1')">Volver</button>
        <div class="contenedor-lista">
            <div class="columna-temas" id="temas-izq"></div>
            <img id="img-album-lista" class="circulo-album" src="" alt="Album">
            <div class="columna-temas" id="temas-der"></div>
        </div>
    </div>

    <div id="p3" class="pantalla">
        <button class="btn-volver" onclick="irA('p2')">Volver</button>
        <h2 id="nombre-tema-reproduciendo">Canción</h2>
        <img id="img-vinilo" class="vinilo" src="" alt="Vinilo">
        <div class="controles">
            <audio id="reproductor-audio" ontimeupdate="actualizarBarra()" onended="siguienteTema()"></audio>
            
            <div class="barra-progreso" id="barra">
                <div id="progreso" style="background:#800000; height:100%; width:0%"></div>
            </div>

            <div class="fila-botones">
                <button class="btn-nav" onclick="reiniciarTema()" title="Reiniciar">
                    <div class="triangulo izq"></div>
                </button>
                <button class="cuadradito-bordo" onclick="pausar()" title="Pausar/Reproducir"></button>
                <button class="btn-nav" onclick="siguienteTema()" title="Siguiente">
                    <div class="triangulo der"></div>
                </button>
            </div>

            <div class="volumen-cont">
                <span>🔈</span>
                <input type="range" id="volumen" min="0" max="1" step="0.01" value="0.5" oninput="cambiarVolumen(this.value)">
                <span>🔊</span>
            </div>
        </div>
    </div>

    <script>

                    { pos: 7, nombre: "¿Ves?", archivo: "Ves.mp3" },
                    { pos: 8, nombre: "Sin Avisar", archivo: "SinAvisar.mp3" },
                    { pos: 9, nombre: "Habeo", archivo: "Habeo.mp3" },
                    { pos: 10, nombre: "La Madeja", archivo: "LaMadeja.mp3" },
                    { pos: 11, nombre: "Capitulo 3 El Agua", archivo: "Capitulo3ElAgua.mp3" },
                    { pos: 12, nombre: "Cancion Para Uno", archivo: "CancionParaUno.mp3" },
                    { pos: 13, nombre: "Mi Tension", archivo: "MiTension.mp3" },
                    { pos: 14, nombre: "La Vuelta Al Sol", archivo: "LaVueltaalSol.mp3" },
                    { pos: 15, nombre: "Su Ley", archivo: "SuLey.mp3" },
                    { pos: 16, nombre: "Epilogo", archivo: "Epilogo.mp3" }
                ]
            },
            {
                artista: "Los Rodríguez", album: "Palabras más, palabras menos", portada: "https://www.cmtv.com.ar/tapas-cd/rodriguezpalabrasmas.webp",
                temas: [
                    { pos: 1, nombre: "Milonga del Marinero y el Capitán", archivo: "MILONGADELMARINEROYELCAPITAN.mp3" },
                    { pos: 2, nombre: "Palabras más, palabras menos", archivo: "PALABRASMASPALABRASMENOS.mp3" },
                    { pos: 3, nombre: "Aquí No Podemos Hacerlo", archivo: "AQUINOPODEMOSHACERLO.mp3" },
                    { pos: 4, nombre: "Todavía Una Canción de Amor", archivo: "TODAVIAUNACANCIONDEAMOR.mp3" },
                    { pos: 5, nombre: "Para No Olvidar", archivo: "PARANOOLVIDAR.mp3" },
                    { pos: 6, nombre: "El Tiempo Lo Dira", archivo: "ELTIEMPODIRA.mp3" },
                    { pos: 7, nombre: "En un Hotel de Mil Estrellas", archivo: "ENUNHOTELDEMILESTRELLAS.mp3" },
                    { pos: 8, nombre: "Mucho Mejor", archivo: "MUCHOMEJOR.mp3" },
                    { pos: 9, nombre: "La Puerta de al Lado", archivo: "LAPUERTADEALLADO.mp3" },
                    { pos: 10, nombre: "Una Forma de Vida", archivo: "UNAFORMADEVIDA.mp3" },
                    { pos: 11, nombre: "Extraño", archivo: "EXTRAÑO.mp3" },
                    { pos: 12, nombre: "10 Años Despues", archivo: "10AÑOSDESPUES.mp3" },
                    { pos: 13, nombre: "Algunos Hombres Buenos", archivo: "ALGUNOHOMBRESBUENOS.mp3" },
                    { pos: 14, nombre: "", archivo: "" }, { pos: 15, nombre: "", archivo: "" }, { pos: 16, nombre: "", archivo: "" }
                ]
            },
            {
                artista: "Las Pastillas del Abuelo", album: "Las Pastillas Del Abuelo", portada: "https://www.pastillas.com.ar/images/imagenes/discos/segundodisco.jpg",
                temas: [
                    { pos: 1, nombre: "Oportunistas", archivo: "oportunistas.mp3" },
                    { pos: 2, nombre: "Tantas escaleras", archivo: "tantasescaleras.mp3" },
                    { pos: 3, nombre: "Candombe de resacas", archivo: "candombederesaca.mp3" },
                    { pos: 4, nombre: "Enano", archivo: "enano.mp3" },
                    { pos: 5, nombre: "Por colectora", archivo: "porcolectora.mp3" },
                    { pos: 6, nombre: "Amar y envejecer", archivo: "amaryenvejecer.mp3" },
                    { pos: 7, nombre: "Otra vuelta de tuerca", archivo: "otravueltadetuerca.mp3" },
                    { pos: 8, nombre: "Viejo", archivo: "viejo.mp3" },
                    { pos: 9, nombre: "Osiris", archivo: "osiris.mp3" },
                    { pos: 10, nombre: "Desde la postura", archivo: "desdelapostura.mp3" },
                    { pos: 11, nombre: "Locura y realidad", archivo: "locurayrealidad.mp3" },
                    { pos: 12, nombre: "Historias", archivo: "historias.mp3" },
                    { pos: 13, nombre: "", archivo: "" }, { pos: 14, nombre: "", archivo: "" }, { pos: 15, nombre: "", archivo: "" }, { pos: 16, nombre: "", archivo: "" }
                ]
            },
            {
                artista: "Los Piojos", album: "3er Arco", portada: "https://akamai.sscdn.co/tb/next/?url=%2Fuploadfile%2Fletras%2Falbuns%2F0%2Fe%2F1%2Ff%2F639591718288314.jpg&w=3840&q=75",
                temas: [
                    { pos: 1, nombre: "Esquina Libertad", archivo: "esquina.mp3" },
                    { pos: 2, nombre: "Taxi Boy", archivo: "taxiboy.mp3" },
                    { pos: 3, nombre: "El Farolito", archivo: "farolito.mp3" },
                    { pos: 4, nombre: "Shup - Shup", archivo: "shup.mp3" },
                    { pos: 5, nombre: "Al Atardecer", archivo: "atardecer.mp3" },
                    { pos: 6, nombre: "Qué Decís", archivo: "quedecis.mp3" },
                    { pos: 7, nombre: "Don't Say Tomorrow", archivo: "dont.mp3" },
                    { pos: 8, nombre: "Todo Pasa", archivo: "todopasa.mp3" },
                    { pos: 9, nombre: "Intro Maradó", archivo: "intro.mp3" },
                    { pos: 10, nombre: "Maradó", archivo: "Marado.mp3" },
                    { pos: 11, nombre: "Gris", archivo: "gris.mp3" },
                    { pos: 12, nombre: "Muévelo", archivo: "muevelo.mp3" },
                    { pos: 13, nombre: "Verano Del '92", archivo: "verano.mp3" },
                    { pos: 14, nombre: "", archivo: "" }, { pos: 15, nombre: "", archivo: "" }, { pos: 16, nombre: "", archivo: "" }
                ]
            },
            {
                artista: "Andrés Calamaro", album: "Alta Suciedad", portada: "https://exileshmagazine.com/wp-content/uploads/2015/02/altasuciedad1997.jpg",
                temas: [
                    { pos: 1, nombre: "Alta Suciedad", archivo: "altasuciedad.mp3" },
                    { pos: 2, nombre: "Todo Lo Demás Tambien", archivo: "todolodemas.mp3" },
                    { pos: 3, nombre: "Donde Manda Marinero", archivo: "marinero.mp3" },
                    { pos: 4, nombre: "Loco", archivo: "loco.mp3" },
                    { pos: 5, nombre: "Flaca", archivo: "flaca.mp3" },
                    { pos: 6, nombre: "Quién Asó La Manteca?", archivo: "manteca.mp3" },
                    { pos: 7, nombre: "Media Veronica", archivo: "veronica.mp3" },
                    { pos: 8, nombre: "El Tercio de Los Sueños", archivo: "tercio.mp3" },
                    { pos: 9, nombre: "Comida China", archivo: "comidachina.mp3" },
                    { pos: 10, nombre: "Elvis Está Vivo", archivo: "elvis.mp3" },
                    { pos: 11, nombre: "Me Arde", archivo: "mearde.mp3" },
                    { pos: 12, nombre: "Crimenes Perfectos", archivo: "crimenes.mp3" },
                    { pos: 13, nombre: "Nunca Es Igual", archivo: "nuncaesigual.mp3" },
                    { pos: 14, nombre: "El Novio Del Olvido", archivo: "novio.mp3" },
                    { pos: 15, nombre: "Catalina Bahia (Bonus Track)", archivo: "catalina.mp3" },
                    { pos: 16, nombre: "", archivo: "" }
                ]
            }
        ];

        let albumSeleccionado = null;
        let indiceTemaActual = 0;
        const player = document.getElementById('reproductor-audio');

        function cargarGaleria() {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = "";
            datos.forEach((album, index) => {
                galeria.innerHTML += `
                    <div class="album-card" onclick="verAlbum(${index})">
                        <p>${album.artista}<br><b>${album.album}</b></p>
                        <img src="${album.portada}" alt="Portada">
                    </div>`;
            });
        }

        function irA(pantallaId) {
            if (pantallaId === 'p1' || pantallaId === 'p2') {
                player.pause();
                document.getElementById('img-vinilo').classList.remove('girando');
            }
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(pantallaId).classList.add('activa');
        }

        function verAlbum(index) {
            albumSeleccionado = datos[index];
            document.getElementById('img-album-lista').src = albumSeleccionado.portada;
            const izq = document.getElementById('temas-izq');
            const der = document.getElementById('temas-der');
            izq.innerHTML = ""; der.innerHTML = "";

            albumSeleccionado.temas.forEach((tema, i) => {
                const esVacio = tema.nombre === "";
                const claseVacio = esVacio ? "vacio" : "";
                const onclick = esVacio ? "" : `onclick="reproducir(${i})"`;
                
                const html = `
                    <button class="btn-tema ${claseVacio}" ${onclick}>
                        <div class="play-square">${tema.pos}</div> 
                        ${esVacio ? "---" : tema.nombre}
                    </button>`;
                if(i < 8) izq.innerHTML += html; else der.innerHTML += html;
            });
            irA('p2');
        }

        function reproducir(indice) {
            indiceTemaActual = indice;
            const tema = albumSeleccionado.temas[indice];
            if(!tema || !tema.nombre) return;

            document.getElementById('nombre-tema-reproduciendo').innerText = tema.nombre;
            document.getElementById('img-vinilo').src = albumSeleccionado.portada;
            
            player.src = tema.archivo;
            player.play();
            document.getElementById('img-vinilo').classList.add('girando');
            irA('p3');
        }

        function siguienteTema() {
            let siguiente = indiceTemaActual + 1;
            while (siguiente < albumSeleccionado.temas.length && !albumSeleccionado.temas[siguiente].nombre) {
                siguiente++;
            }
            if (siguiente >= albumSeleccionado.temas.length) { siguiente = 0; }
            reproducir(siguiente);
        }

        function pausar() {
            const v = document.getElementById('img-vinilo');
            if (!player.paused) { player.pause(); v.classList.remove('girando'); } 
            else { player.play(); v.classList.add('girando'); }
        }

        function reiniciarTema() {
            player.currentTime = 0;
            if (player.paused) { player.play(); document.getElementById('img-vinilo').classList.add('girando'); }
        }

        function actualizarBarra() {
            if (player.duration) {
                const pct = (player.currentTime / player.duration) * 100;
                document.getElementById('progreso').style.width = pct + "%";
            }
        }

        function cambiarVolumen(v) { player.volume = v; }

        cargarGaleria();
    </script>
</body>
</html>
